name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build binaries and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build all platforms
        run: |
          mkdir -p release
          go build -ldflags="-s -w" -o release/domaincraft-linux-amd64 ./cmd/domaincraft
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o release/domaincraft-linux-arm64 ./cmd/domaincraft
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o release/domaincraft-darwin-amd64 ./cmd/domaincraft
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o release/domaincraft-darwin-arm64 ./cmd/domaincraft
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o release/domaincraft-windows-amd64.exe ./cmd/domaincraft

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/domaincraft-linux-amd64
            release/domaincraft-linux-arm64
            release/domaincraft-darwin-amd64
            release/domaincraft-darwin-arm64
            release/domaincraft-windows-amd64.exe
            release/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
